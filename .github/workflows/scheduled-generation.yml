name: Scheduled Generation
on:
  schedule:
    - cron: '0 2 * * *' # 2 AM UTC = 8 AM BD time
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger next pending roadmap phase
        env:
          API_URL: ${{ secrets.API_URL }}
        run: |
          curl -X POST "$API_URL/api/roadmap/next-pending/start" \
               -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
               -d '{}'
